name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: FastAPI Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fastapi_api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml:coverage.xml

      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: fastapi_api/coverage.xml

  test-frontend:
    name: React Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: react_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: react_app/coverage/lcov.info

      - name: Lint
        run: npm run lint

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download API coverage
        uses: actions/download-artifact@v4
        with:
          name: api-coverage
          path: fastapi_api

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: react_app/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
