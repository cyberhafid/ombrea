name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: FastAPI Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fastapi_api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  test-frontend:
    name: React Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: react_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Lint
        run: npm run lint
